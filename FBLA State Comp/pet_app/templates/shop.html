<!DOCTYPE html>
<html>
<body>
    <h1>Shop</h1>
    <p>Wallet: ${{ wallet }}</p>

    {% for item, info in shop.items() %}
        <form method="POST">
            <p>{{ item }} - ${{ info.cost }} (Owned: {{ inventory[item] }})</p>
            <button name="item" value="{{ item }}">Buy</button>
        </form>
    {% endfor %}

    <a href="/game">Back</a>
</body>
</html>
